# Experiment Configuration for Construction MARL

env_config:
  num_robots: 4
  render: False
  time_limit: 1000
  comm_mode: "hybrid" 
  failure_rate: 0.005 # Probability of robot failure per step
  obstacle_count: 5   # Number of static blockages

marl_config:
  algorithm: "MAPPO" # Choices: MAPPO, QMIX
  policy_sharing: True # Centralized vs Decentralized logic
  
training_config:
  num_workers: 2
  train_batch_size: 4000
  framework: "torch"
  lr: 0.0001
  gamma: 0.99
  stop_iterations: 100

scenario_details:
  zones:
    - {name: "Zone A", priority: 5, deadline: 500}
    - {name: "Zone B", priority: 3, deadline: 800}
    - {name: "Zone C", priority: 1, deadline: 1000}
  robot_types:
    agv: 2
    bricklayer: 2
